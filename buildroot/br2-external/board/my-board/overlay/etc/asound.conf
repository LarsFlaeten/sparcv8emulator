# Use plughw:0,0 as the default PCM.
# plughw performs software format/rate conversion so SDL1 can request
# S16_BE at any rate; the plug layer converts to what hw:0,0 accepts (S16_LE).
# This also bypasses the ICH.conf card-specific default which routes through
# dmix and requires mmap support.
pcm.!default "plughw:0,0"

ctl.!default {
    type hw
    card 0
}
