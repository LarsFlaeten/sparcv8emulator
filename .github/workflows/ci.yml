name: CI

on:
  push:
    branches: [ "main", "fix_smp_locking" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake g++ libsdl2-dev portaudio19-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        # APBUARTTest, APBCTRLTest, AC97Test, and GRPCI2Test.ac97_init require
        # a real TTY or audio device and are skipped in headless CI.
        run: |
          ctest --test-dir build --output-on-failure \
            -E "APBUARTTest|APBCTRLTest|AC97Test|GRPCI2Test\.ac97_init" \
            --output-junit test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
